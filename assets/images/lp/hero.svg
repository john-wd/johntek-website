    <path d="M77 195c-29 0-53-23-53-52 0-28 22-51 50-52 7-38 41-67 81-67 25 0 48 11 63 29 15-10 32-15 51-15 46 0 84 37 84 83v2c26 7 45 31 45 59 0 34-27 61-61 61H84c-33 0-60-21-60-48Z" fill="url(#cloud)" stroke="#fff" stroke-width="9"/>
