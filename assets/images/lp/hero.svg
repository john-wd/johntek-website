<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1254 1254" role="img" aria-labelledby="title desc">
  <title id="title">Johntek Preview 4 J logo</title>
  <desc id="desc">A dimensional cyan and white J brand mark with digital speed lines on a transparent background.</desc>

  <defs>
    <linearGradient id="cyanHorizontal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#70f1f6"/>
      <stop offset="0.55" stop-color="#45dbe5"/>
      <stop offset="1" stop-color="#20bccb"/>
    </linearGradient>
    <linearGradient id="cyanVertical" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#49e4ec"/>
      <stop offset="0.45" stop-color="#22c7d5"/>
      <stop offset="1" stop-color="#009caf"/>
    </linearGradient>
    <linearGradient id="whiteFace" x1="0" y1="0" x2="0.85" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.62" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d8f8fb"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0" stop-color="#faffff"/>
      <stop offset="0.28" stop-color="#e4fbfd"/>
      <stop offset="0.6" stop-color="#55e3eb"/>
      <stop offset="1" stop-color="#00a6bd"/>
    </linearGradient>
    <linearGradient id="ribbonStripe" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12c5d3"/>
      <stop offset="0.55" stop-color="#24cbd8"/>
      <stop offset="1" stop-color="#008ca4"/>
    </linearGradient>
    <mask id="browserCutouts">
      <rect x="277" y="191" width="550" height="92" rx="23" fill="white"/>
      <circle cx="324" cy="237" r="15" fill="black"/>
      <circle cx="377" cy="237" r="15" fill="black"/>
      <circle cx="430" cy="237" r="15" fill="black"/>
    </mask>
  </defs>

  <!-- Digital/speed accents -->
  <g fill="url(#cyanHorizontal)">
    <rect x="277" y="191" width="550" height="92" rx="23" mask="url(#browserCutouts)"/>
    <rect x="293" y="322" width="146" height="22" rx="11"/>
    <rect x="334" y="365" width="231" height="22" rx="11"/>
    <rect x="365" y="412" width="159" height="23" rx="11"/>
    <rect x="542" y="412" width="161" height="23" rx="11"/>
    <rect x="382" y="457" width="134" height="23" rx="11"/>
    <rect x="537" y="457" width="92" height="23" rx="11"/>
    <rect x="367" y="502" width="50" height="23" rx="11"/>
    <rect x="331" y="546" width="197" height="22" rx="11"/>
    <rect x="289" y="589" width="163" height="23" rx="11"/>
  </g>
  <g fill="url(#whiteFace)">
    <rect x="646" y="457" width="85" height="23" rx="11"/>
    <rect x="434" y="502" width="205" height="23" rx="11"/>
  </g>

  <!-- Rear rising ribbon -->
  <path fill="url(#ribbon)" d="M616 1097C763 1062 856 957 856 699V414C856 292 916 205 1035 151V680C1035 901 891 1058 616 1097Z"/>
  <path fill="url(#ribbonStripe)" d="M675 1077C797 1024 856 905 856 699V410C893 360 951 315 1035 281V333C968 376 937 430 937 518V699C937 877 848 1013 675 1077Z" opacity="0.95"/>
  <path fill="#c8f7fa" d="M616 1097C724 1052 779 956 779 780V735C797 901 760 1026 616 1097Z" opacity="0.78"/>

  <!-- Main J turquoise depth -->
  <path fill="url(#cyanVertical)" d="M204 663H464V682C464 789 521 854 625 854C728 854 779 787 779 682V449C779 427 796 407 826 398V684C826 922 710 1068 565 1068C353 1068 210 910 204 663Z"/>

  <!-- White front face -->
  <path fill="url(#whiteFace)" d="M363 663H464V682C464 789 521 854 625 854C728 854 779 787 779 682V449C779 427 796 407 826 398V684C826 921 710 1068 565 1068C470 1068 394 1027 344 977C392 1013 449 1032 515 1032C681 1032 779 905 779 684V682C779 803 716 898 614 898C458 898 363 806 363 663Z"/>

  <!-- Lower cyan face highlight -->
  <path fill="#4fe1e8" d="M204 663H363C363 806 458 898 614 898C638 898 661 893 681 884C636 974 561 1029 461 1022C315 1012 215 871 204 663Z" opacity="0.72"/>
  <path fill="#009eb3" d="M421 1016C504 1045 595 1027 665 968C623 1037 555 1070 485 1061C462 1051 441 1036 421 1016Z" opacity="0.55"/>
</svg>
