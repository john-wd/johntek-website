    <rect width="346" height="218" rx="16" fill="#f2fbff" stroke="#fff" stroke-width="6"/>
    <rect x="16" y="17" width="314" height="174" rx="6" fill="url(#panel)" stroke="#4c9dde"/>
    <g stroke="#84caff" stroke-linecap="round" stroke-width="5">
