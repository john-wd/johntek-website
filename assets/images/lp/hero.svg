  <g transform="translate(1170 686)" filter="url(#soft-shadow)">
    <path d="M0 16v91c0 12 29 21 63 21s63-9 63-21V16" fill="url(#database)" stroke="#5aa7df" stroke-width="3"/>
    <ellipse cx="63" cy="16" rx="63" ry="16" fill="#dff5ff" stroke="#5aa7df" stroke-width="3"/>
    <path d="M0 53c0 12 29 21 63 21s63-9 63-21M0 91c0 12 29 21 63 21s63-9 63-21" fill="none" stroke="#1d69b4" stroke-width="4"/>
