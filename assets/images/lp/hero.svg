<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 1024" role="img" aria-labelledby="title desc">
  <title id="title">Cloud systems engineering illustration</title>
  <desc id="desc">Servers connected to a code editor, cloud services, a monitoring dashboard, and a database.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#123f82"/>
      <stop offset="1" stop-color="#05275e"/>
    </linearGradient>
    <linearGradient id="panel-light" x1="0" x2="1">
      <stop stop-color="#dff4ff"/>
      <stop offset="1" stop-color="#8ccfff"/>
    </linearGradient>
    <linearGradient id="cloud" x1=".1" x2=".9" y1=".1" y2=".9">
      <stop stop-color="#eff8ff"/>
      <stop offset="1" stop-color="#9ebeff"/>
    </linearGradient>
    <linearGradient id="cloud-back" x1=".15" x2=".85" y1=".15" y2=".85">
      <stop stop-color="#85dcff"/>
      <stop offset="1" stop-color="#2185e0"/>
    </linearGradient>
    <linearGradient id="database" x1="0" x2="1">
      <stop stop-color="#97d5ff"/>
      <stop offset=".5" stop-color="#dff6ff"/>
      <stop offset="1" stop-color="#77bdf2"/>
    </linearGradient>
    <radialGradient id="backdrop">
      <stop stop-color="#e8f6ff" stop-opacity=".78"/>
      <stop offset=".6" stop-color="#b8ddfa" stop-opacity=".26"/>
      <stop offset="1" stop-color="#7ba6c8" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft-shadow" x="-20%" y="-20%" width="150%" height="160%">
      <feDropShadow dx="0" dy="9" stdDeviation="10" flood-color="#276aa4" flood-opacity=".22"/>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#88c9f3" stroke-opacity=".12"/>
    </pattern>
    <g id="server">
      <rect width="292" height="80" rx="9" fill="url(#panel-light)" stroke="#5aabeb"/>
      <rect x="0" y="64" width="292" height="16" fill="#0a3d86" opacity=".9"/>
      <circle cx="28" cy="34" r="9" fill="#2f82d8" stroke="#fff" stroke-width="2"/>
      <g fill="#1a5ea7">
        <circle cx="66" cy="23" r="2"/><circle cx="78" cy="23" r="2"/><circle cx="90" cy="23" r="2"/><circle cx="102" cy="23" r="2"/><circle cx="114" cy="23" r="2"/><circle cx="126" cy="23" r="2"/><circle cx="138" cy="23" r="2"/><circle cx="150" cy="23" r="2"/>
        <circle cx="66" cy="34" r="2"/><circle cx="78" cy="34" r="2"/><circle cx="90" cy="34" r="2"/><circle cx="102" cy="34" r="2"/><circle cx="114" cy="34" r="2"/><circle cx="126" cy="34" r="2"/><circle cx="138" cy="34" r="2"/><circle cx="150" cy="34" r="2"/>
        <circle cx="66" cy="45" r="2"/><circle cx="78" cy="45" r="2"/><circle cx="90" cy="45" r="2"/><circle cx="102" cy="45" r="2"/><circle cx="114" cy="45" r="2"/><circle cx="126" cy="45" r="2"/><circle cx="138" cy="45" r="2"/><circle cx="150" cy="45" r="2"/>
      </g>
      <path d="M197 25h67M197 36h57M197 47h48" stroke="#fff" stroke-linecap="round" stroke-width="4"/>
      <rect x="172" y="22" width="14" height="19" rx="6" fill="#fff"/>
    </g>
  </defs>

  <ellipse cx="770" cy="518" rx="715" ry="470" fill="url(#backdrop)"/>
  <path d="M120 712H1415M145 540H1390M240 370H1310M438 258H1000" stroke="#7cc5f4" stroke-opacity=".28" stroke-width="2"/>
  <path d="M165 657V430H385L455 348H580M432 726V546H616M1000 730V414H1265V602H1405M654 224H1040" fill="none" stroke="#7cc5f4" stroke-dasharray="5 12" stroke-opacity=".42" stroke-width="2"/>
  <path d="M249 327H544M249 327l-54 54M452 520l79-110M770 218c104-69 230-62 338 9M1096 754h244" fill="none" stroke="#9fd9fb" stroke-opacity=".45" stroke-width="2"/>
  <g fill="#dff5ff" stroke="#62baf0" stroke-width="3">
    <circle cx="165" cy="657" r="7"/><circle cx="432" cy="726" r="7"/><circle cx="455" cy="348" r="8"/>
    <circle cx="654" cy="224" r="8"/><circle cx="1040" cy="224" r="8"/><circle cx="1265" cy="602" r="7"/>
    <circle cx="1405" cy="602" r="9"/><circle cx="531" cy="410" r="6"/><circle cx="249" cy="327" r="6"/>
  </g>

  <g transform="translate(145 387)" filter="url(#soft-shadow)">
    <use href="#server"/>
    <use href="#server" y="96"/>
    <use href="#server" y="192"/>
    <use href="#server" y="288"/>
