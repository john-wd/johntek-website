name: Deploy Hugo site to Hostinger

on:
  push:
    branches:
      - master
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * *"
      timezone: "America/New_York"

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        env:
          HOSTINGER_SSH_HOSTS: ${{ vars.HOSTINGER_SSH_HOSTS }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/hostinger_key
          chmod 600 ~/.ssh/hostinger_key
          
          echo "$HOSTINGER_SSH_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true

      - name: Build site
        run: hugo --minify

      - name: Deploy with rsync
        run: |
          rsync -az --delete \
            --exclude '.htaccess' \
            --exclude 'resume.pdf' \
            -e "ssh -i ~/.ssh/hostinger_key -p ${{ secrets.HOSTINGER_PORT }}" \
            public/ \
            "${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_TARGET }}"
  changes:
    runs-on: ubuntu-latest
    outputs:
      resume: ${{ steps.filter.outputs.resume }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            resume:
              - 'templates/resume/**'
              - 'data/resume.yaml'
              - '.github/workflows/deploy.yaml'
              
  render-resume:
    runs-on: ubuntu-latest
    needs: 
      - changes
      - deploy
    if: needs.changes.outputs.resume == 'true'
    
    steps:
      - name: Configure SSH
        env:
          HOSTINGER_SSH_HOSTS: ${{ vars.HOSTINGER_SSH_HOSTS }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/hostinger_key
          chmod 600 ~/.ssh/hostinger_key
          
          echo "$HOSTINGER_SSH_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Checkout repository
        uses: actions/checkout@v5
      - uses: wtfjoke/setup-tectonic@v4
      - uses: actions/cache@v3
        name: Tectonic Cache
        with:
          path: ~/.cache/Tectonic
          key: ${{ runner.os }}-tectonic-${{ hashFiles('templates/resume/*.cls') }}
          restore-keys: |
            ${{ runner.os }}-tectonic-
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Build resume
        run: go run . resume publish
      - name: Deploy resume PDF with rsync
        run: |
          rsync -az \
            -e "ssh -i ~/.ssh/hostinger_key -p ${{ secrets.HOSTINGER_PORT }}" \
            public/resume.pdf \
            "${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_TARGET }}/resume.pdf"