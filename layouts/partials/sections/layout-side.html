<div class="l-container l-section">
    {{ partial "sections/header.html" . }}

    <div class="l-section-body l-flex l-flex--row {{ delimit (.Params.classes | default (slice)) " " }}">
        {{ range .Params.items }}
        <div {{if .size}}style="flex: {{.size}};"{{end}}>
            {{ .content | markdownify }}
        </div>
        {{ end }}
    </div>
</div>
