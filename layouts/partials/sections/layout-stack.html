<div class="l-container l-section">
    <div class="l-section-head">
        {{ if .nav.label }}
            <span class="l-section-head__label">{{.nav.label}}</span>
        {{ end }}
        {{ if .title }}
            <h1 class="l-section-head__title">{{.title}}</h1>
        {{ end }}
        {{ if .description }}
            <p class="l-section-head__description">{{.description}}</p>
        {{ end }}
        {{ if .image }}
            <img src="{{ .image }}" alt="{{ .title }}" class="l-section-head__image" />
        {{ end }}
    </div>

    <div class="l-section-body l-flex l-flex--column {{ delimit (.classes | default (slice)) " " }}">
        {{ range .items }}
        <div>
            {{ .content | markdownify }}
        </div>
        {{ end }}
    </div>
</div>
