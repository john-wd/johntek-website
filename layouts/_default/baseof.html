<!doctype html>
<html lang="en">
  <head>
    {{ partial "head.html" . }}

  </head>
  {{ $hasHero := false }}
  {{ with .Params.sections }}
  {{ range . }}
    {{ if eq .type "hero" }}
      {{ $hasHero = true }}
    {{ end }}
  {{ end }}
  {{ end }}
  
  <body{{ if $hasHero }} class="has-hero"{{ end }}>
    {{ partial "navbar.html" . }} 
    {{ block "main" . }} {{ end }} 
    
    {{ partial "footer.html" . }}
  </body>
</html>
