<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1568 882" role="img" aria-labelledby="title desc">
  <title id="title">Glowing blue circuit board</title>
  <desc id="desc">A dark blue circuit board with routed traces, processor blocks, vias and cyan indicator lights.</desc>
  <defs>
    <radialGradient id="background" cx=".52" cy=".48" r=".82">
      <stop stop-color="#074eac"/>
      <stop offset=".52" stop-color="#033579"/>
      <stop offset="1" stop-color="#00183f"/>
    </radialGradient>
    <linearGradient id="trace" x1="0" x2="1">
      <stop stop-color="#0755c9"/>
      <stop offset=".5" stop-color="#08b7ff"/>
      <stop offset="1" stop-color="#0755c9"/>
    </linearGradient>
    <linearGradient id="bright-trace" x1="0" x2="1" y1="1" y2="0">
      <stop stop-color="#0872e8"/>
      <stop offset=".55" stop-color="#0cc8ff"/>
      <stop offset="1" stop-color="#0869df"/>
    </linearGradient>
    <radialGradient id="led">
      <stop stop-color="#d8ffff"/>
      <stop offset=".18" stop-color="#22ffff"/>
      <stop offset=".62" stop-color="#00dff5"/>
      <stop offset="1" stop-color="#00aee8"/>
    </radialGradient>
    <filter id="glow" x="-300%" y="-300%" width="700%" height="700%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#0b61bb" stroke-opacity=".08"/>
    </pattern>
    <g id="via">
      <circle r="11" fill="#0787ed"/>
      <circle r="5" fill="#064485"/>
    </g>
    <g id="node">
      <circle r="12" fill="url(#led)" filter="url(#glow)"/>
      <circle r="6" fill="#65ffff"/>
    </g>
    <g id="pin-row">
